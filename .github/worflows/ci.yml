name: CI Pipeline BCB

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4


      - name: Configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install r--upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Rodar testes
        run: pytest tests/-v


